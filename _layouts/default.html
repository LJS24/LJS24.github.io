<!doctype html>
<html lang="{{ site.lang | default: 'en' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>
      {% if page.title %}
        {{ page.title }} | {{ site.title }}
      {% else %}
        {{ site.title }}
      {% endif %}
    </title>
    <meta name="description" content="{{ page.summary | default: site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <div class="brand-block">
          <p class="brand-kicker">Knowledge Journal</p>
          <h1 class="site-title"><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
          <p class="site-description">{{ site.description }}</p>
        </div>
        {% include nav.html %}
      </div>
    </header>

    <main class="container page-shell">
      {{ content }}
    </main>

    <footer class="container site-footer">
      <p>Built with GitHub Pages. Structured for learning, research, and project sharing.</p>
    </footer>
  </body>
</html>
